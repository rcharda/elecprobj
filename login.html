<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion | ElecPro</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="login-shell">
    <section class="login-card">
      <h1>ELECPRO</h1>
      <p style="color:#6a758a;">Bienvenue sur votre espace de gestion</p>
      <form onsubmit="handleLogin(event)">
        <label>Email</label>
        <input id="email" class="input" type="email" placeholder="Votre adresse email" required />
        <label>Mot de passe</label>
        <input id="password" class="input" type="password" placeholder="Votre mot de passe" required />
        <button class="btn btn-primary" type="submit">SE CONNECTER</button>
      </form>
      <div id="error" class="error"></div>
      <p style="font-size:.85rem;color:#6a758a; margin-top:12px;">Accès réservé aux membres autorisés d'ElecPro</p>
    </section>
  </main>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
